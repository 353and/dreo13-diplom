{% extends "base.html" %}
{% block title %}Моя коллекция{% endblock %}
{% block content %}
<h1 class="mb-4">Моя коллекция</h1>

<!-- Форма создания нового плейлиста -->
<div class="card mb-4">
    <div class="card-body">
        <h5 class="card-title">Создать новый плейлист</h5>
        <form method="post" action="/playlist/create">
            <div class="input-group">
                <input type="text" class="form-control" name="name" placeholder="Название плейлиста" required>
                <button class="btn btn-primary" type="submit">Создать</button>
            </div>
        </form>
    </div>
</div>

<!-- Сетка плейлистов -->
<div class="row">
    {% for playlist in playlists %}
    <div class="col-md-4 col-lg-3 mb-4">
        <div class="card playlist-card h-100">
            <a href="/playlist/{{ playlist.id }}" class="text-decoration-none">
                <div class="playlist-cover">
                    <i class="fas fa-music"></i>
                </div>
                <div class="card-body">
                    <h5 class="card-title text-truncate">{{ playlist.name }}</h5>
                    <p class="card-text text-muted">{{ playlist.tracks|length }} треков</p>
                </div>
            </a>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
